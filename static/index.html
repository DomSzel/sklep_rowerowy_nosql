<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sklep Rowerowy KuDom</title>
    <link rel="stylesheet" href="/static/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <nav class="navbar">
        <div class="logo">🚲 KuDom Bikes</div>
        <div class="nav-links">
            <button onclick="showSection('catalog')">Katalog</button>
            <button onclick="showSection('add-bike')">Dodaj Rower</button>
            <button onclick="showSection('reports')">Raporty</button>
            <button onclick="showSection('cart')" class="cart-btn">Koszyk <span id="cart-count">0</span></button>
        </div>
    </nav>

    <main class="container">
        <!-- Sekcja Katalogu -->
        <section id="catalog" class="active">
            <div class="section-header">
                <h2>Nasze Rowery</h2>
                <div class="filters">
                    <input type="number" id="filter-price" placeholder="Maks. cena">
                    <input type="text" id="filter-tag" placeholder="Tag (np. MTB)">
                    <button onclick="loadBikes()">Szukaj</button>
                </div>
            </div>
            <div id="bikes-grid" class="grid"></div>
        </section>

        <!-- Sekcja Dodawania Roweru -->
        <section id="add-bike">
            <div class="card form-card">
                <h2>Dodaj Nowy Rower</h2>
                <form id="add-bike-form" onsubmit="addBike(event)">
                    <div class="form-group">
                        <label>Marka</label>
                        <input type="text" id="add-brand" required>
                    </div>
                    <div class="form-group">
                        <label>Model</label>
                        <input type="text" id="add-model" required>
                    </div>
                    <div class="form-group">
                        <label>Cena (PLN)</label>
                        <input type="number" step="0.01" id="add-price" required>
                    </div>
                    <div class="form-group">
                        <label>Ilość (Sztuk)</label>
                        <input type="number" id="add-stock" required>
                    </div>
                    <div class="form-group">
                        <label>Tagi (po przecinku)</label>
                        <input type="text" id="add-tags">
                    </div>
                    <button type="submit" class="btn-primary">Dodaj do bazy</button>
                </form>
            </div>
        </section>

        <!-- Sekcja Koszyka -->
        <section id="cart">
            <div class="card form-card">
                <h2>Twój Koszyk</h2>
                <div id="cart-items" class="cart-list"></div>
                <div class="cart-total">Suma: <span id="cart-total-price">0.00</span> PLN</div>
                <form id="order-form" onsubmit="placeOrder(event)" style="margin-top: 20px;">
                    <div class="form-group">
                        <label>Email Klienta (dla statusu VIP)</label>
                        <input type="email" id="order-email" required>
                    </div>
                    <button type="submit" class="btn-success">Złóż Zamówienie</button>
                </form>
            </div>
        </section>

        <!-- Sekcja Raportów -->
        <section id="reports">
            <h2>Raport Sprzedaży</h2>
            <button onclick="loadReports()" class="btn-primary" style="margin-bottom: 20px;">Odśwież Raport</button>
            <div class="table-container">
                <table class="styled-table">
                    <thead>
                        <tr>
                            <th>Marka</th>
                            <th>Sprzedane sztuki</th>
                            <th>Przychód całkowity (PLN)</th>
                        </tr>
                    </thead>
                    <tbody id="reports-body">
                    </tbody>
                </table>
            </div>
        </section>
    </main>

    <!-- Notification Toast -->
    <div id="toast" class="toast">Komunikat</div>

    <script src="/static/app.js"></script>
</body>
</html>
